# ============================================================
# Cloud Build Config — JobSeeker AI Frontend
# Deploy Next.js ke Google Cloud Run
# Jalankan: gcloud builds submit --config cloudbuild-frontend.yaml .
# ============================================================

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "--file=frontend/Dockerfile"
      - "--tag=asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend:$BUILD_ID"
      - "--tag=asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend:latest"
      - "./frontend"

  # Step 2: Push image ke Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend"
    waitFor: ["build-image"]

  # Step 3: Deploy ke Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloudrun"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "skillbridge-frontend"
      - "--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend:$BUILD_ID"
      - "--region=asia-southeast2"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=3"
      # Env vars runtime (Proxy akan membaca ini secara aman di server-side)
      - "--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,BACKEND_URL=$_BACKEND_URL,API_KEY=$_API_KEY"
    waitFor: ["push-image"]

# Image yang disimpan setelah build
images:
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend:$BUILD_ID"
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/skillbridge/frontend:latest"

# Timeout build (Next.js build bisa agak lama)
timeout: "1200s"

options:
  logging: CLOUD_LOGGING_ONLY

# Deklarasi variabel custom substitution
substitutions:
  _BACKEND_URL: ""
  _API_KEY: ""

